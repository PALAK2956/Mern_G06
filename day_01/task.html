<!DOCTYPE html>
<html>
<head>
    <title>Blog Cards</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:40px;
        }

        .container{
            display:flex;
            gap:20px;
            justify-content:center;
        }

        .card{
            width:350px;
            background:white;
            overflow:hidden;
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .content{
            padding:15px;
        }

        .category{
            color:#666;
            font-size:14px;
            margin-bottom:10px;
        }

        .title{
            font-size:28px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .desc{
            color:#555;
            line-height:1.5;
            margin-bottom:15px;
        }

        .read-more{
            color:black;
            font-weight:bold;
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
